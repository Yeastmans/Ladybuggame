workflows:
  ios-ladybug-game:
    name: iOS Ladybug Game
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ladybuggame.LadybugGame
      vars:
        XCODE_WORKSPACE: "LadybugGame/LadybugGame.xcodeproj"
        XCODE_SCHEME: "LadybugGame"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd LadybugGame
          xcodegen generate
      - name: Build iOS app
        script: |
          cd LadybugGame
          xcodebuild build \
            -project LadybugGame.xcodeproj \
            -scheme LadybugGame \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - LadybugGame/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
