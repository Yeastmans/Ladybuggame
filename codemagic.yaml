workflows:
  ios-ladybug-game:
    name: iOS Ladybug Game
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_SCHEME: "LadybugGame"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd LadybugGame
          xcodegen generate
      - name: Build for Simulator
        script: |
          cd LadybugGame
          xcodebuild build \
            -project LadybugGame.xcodeproj \
            -scheme LadybugGame \
            -sdk iphonesimulator \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package app
        script: |
          cd LadybugGame/build/Build/Products/Release-iphonesimulator
          zip -r "$CM_BUILD_DIR/LadybugGame-simulator.zip" LadybugGame.app
    artifacts:
      - LadybugGame-simulator.zip
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
