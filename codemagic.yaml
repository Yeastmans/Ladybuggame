workflows:
  ios-ladybug-game:
    name: iOS Ladybug Game
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_SCHEME: "LadybugGame"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate app icon
        script: |
          cd LadybugGame
          swift Scripts/generate_icon.swift Resources/Assets.xcassets/AppIcon.appiconset
      - name: Generate Xcode project
        script: |
          cd LadybugGame
          xcodegen generate
      - name: Archive app
        script: |
          cd LadybugGame
          xcodebuild archive \
            -project LadybugGame.xcodeproj \
            -scheme LadybugGame \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/LadybugGame.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM=""
      - name: Create unsigned IPA
        script: |
          mkdir -p Payload
          cp -r "$CM_BUILD_DIR/LadybugGame.xcarchive/Products/Applications/LadybugGame.app" Payload/
          zip -r "$CM_BUILD_DIR/LadybugGame.ipa" Payload
          rm -rf Payload
    artifacts:
      - LadybugGame.ipa
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
