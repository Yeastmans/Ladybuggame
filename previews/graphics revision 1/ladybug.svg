  <line x1="40.8" y1="16.8" x2="46.6" y2="19.2" stroke="#1a1414" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7.2" y1="24" x2="1.4" y2="26.4" stroke="#1a1414" stroke-width="1.5" stroke-linecap="round"/>
