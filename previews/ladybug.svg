<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 48 48">
  <!-- Ladybug side view — walking -->
  <!-- Legs -->
  <line x1="14" y1="34" x2="12" y2="42" stroke="#1a1414" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="34" x2="20" y2="42" stroke="#1a1414" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="34" x2="28" y2="42" stroke="#1a1414" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="20" cy="24" rx="15" ry="13" fill="#d91e1a" stroke="#8c0d0d" stroke-width="1.5"/>
  <!-- Spots -->
  <circle cx="12" cy="20" r="3" fill="#1a0d0d"/>
  <circle cx="22" cy="18" r="3.5" fill="#1a0d0d"/>
  <circle cx="17" cy="28" r="2.5" fill="#1a0d0d"/>
  <circle cx="28" cy="22" r="2.8" fill="#1a0d0d"/>
  <circle cx="30" cy="30" r="2" fill="#1a0d0d"/>
  <circle cx="10" cy="28" r="2" fill="#1a0d0d"/>
  <!-- Head -->
  <circle cx="38" cy="24" r="7" fill="#1a1414"/>
  <!-- Antennae -->
  <path d="M 41 20 Q 44 14 46 10" stroke="#1a1414" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 40 18 Q 43 15 45 12" stroke="#1a1414" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <circle cx="46" cy="10" r="1.5" fill="#1a1414"/>
  <circle cx="45" cy="12" r="1.2" fill="#1a1414"/>
  <!-- Eye -->
  <circle cx="42" cy="22" r="3" fill="white"/>
  <circle cx="43" cy="23" r="1.5" fill="black"/>
  <circle cx="41.5" cy="21" r="0.6" fill="white"/>
  <!-- Cheek -->
  <ellipse cx="37" cy="28" rx="2.5" ry="1.2" fill="#ff6b6b" opacity="0.3"/>
</svg>
