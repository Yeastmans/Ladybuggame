<svg xmlns="http://www.w3.org/2000/svg" width="224" height="160" viewBox="0 0 56 40">
  <!-- Shadow (on ground when swooping) -->
  <ellipse cx="28" cy="39" rx="10" ry="2.5" fill="black" opacity="0.12"/>

  <!-- Left wing (extended, swooping pose) -->
  <path d="M 16 16 Q 0 10 -2 4 Q 6 8 12 10 Q 8 12 19 20" fill="#4a4a55"/>
  <!-- Right wing -->
  <path d="M 40 16 Q 56 10 58 4 Q 50 8 44 10 Q 48 12 37 20" fill="#4a4a55"/>

  <!-- Wing feather detail -->
  <line x1="4" y1="8" x2="14" y2="14" stroke="#3a3a44" stroke-width="0.6" opacity="0.5"/>
  <line x1="52" y1="8" x2="42" y2="14" stroke="#3a3a44" stroke-width="0.6" opacity="0.5"/>

  <!-- Tail feathers (spiky) -->
  <path d="M 22 31 L 18 40 L 23 35 L 28 40 L 33 35 L 38 40 L 34 31 Z" fill="#664d38"/>

  <!-- Body (brown oval) -->
  <ellipse cx="28" cy="22" rx="12" ry="10.5" fill="#806140" stroke="#664d38" stroke-width="0.8"/>

  <!-- Belly (lighter patch) -->
  <ellipse cx="28" cy="25" rx="7" ry="6" fill="#997755"/>

  <!-- Head (lighter brown circle) -->
  <circle cx="28" cy="10" r="8" fill="#8c6b52" stroke="#664d38" stroke-width="0.6"/>

  <!-- Beak (orange, sharper) -->
  <polygon points="28,0 23.5,7.5 26,8 28,6 30,8 32.5,7.5" fill="#f2a61a" stroke="#cc8800" stroke-width="0.4"/>

  <!-- Eyes (menacing, bigger) -->
  <ellipse cx="23" cy="8.5" rx="3" ry="2.8" fill="white"/>
  <ellipse cx="33" cy="8.5" rx="3" ry="2.8" fill="white"/>
  <!-- Red iris for menace -->
  <circle cx="23.8" cy="9" r="1.6" fill="#cc3300"/>
  <circle cx="33.8" cy="9" r="1.6" fill="#cc3300"/>
  <!-- Pupils -->
  <circle cx="24" cy="9" r="0.9" fill="black"/>
  <circle cx="34" cy="9" r="0.9" fill="black"/>

  <!-- Angry eyebrows (thicker, more menacing) -->
  <line x1="17.5" y1="3.5" x2="25" y2="6" stroke="#40301f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38.5" y1="3.5" x2="31" y2="6" stroke="#40301f" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Talons (reaching forward) -->
  <path d="M 23 31 L 21 35 L 22.5 34 L 23 36 L 24.5 34 L 25 35.5 L 25 31" stroke="#664d38" stroke-width="0.8" fill="#806140"/>
  <path d="M 31 31 L 29 35 L 30.5 34 L 31 36 L 32.5 34 L 33 35.5 L 33 31" stroke="#664d38" stroke-width="0.8" fill="#806140"/>
</svg>
