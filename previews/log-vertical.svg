<svg xmlns="http://www.w3.org/2000/svg" width="80" height="240" viewBox="0 0 28 80">
  <!-- LOG — vertical (stick/branch style, rougher bark) -->

  <!-- Shadow -->
  <ellipse cx="14" cy="78" rx="8" ry="2" fill="black" opacity="0.1"/>

  <!-- Main branch body (slightly tapered) -->
  <path d="M 8 6 Q 7 20 7.5 40 Q 8 60 9 74 L 19 74 Q 20 60 20.5 40 Q 21 20 20 6 Z" fill="#7a5c1e" stroke="#5a4210" stroke-width="0.8"/>

  <!-- Bark texture (horizontal cracks) -->
  <line x1="8" y1="14" x2="20" y2="14" stroke="#5a4210" stroke-width="0.5" opacity="0.35"/>
  <line x1="7.5" y1="26" x2="20.5" y2="26" stroke="#5a4210" stroke-width="0.5" opacity="0.35"/>
  <line x1="7.5" y1="38" x2="20.5" y2="38" stroke="#5a4210" stroke-width="0.5" opacity="0.35"/>
  <line x1="8" y1="50" x2="20" y2="50" stroke="#5a4210" stroke-width="0.5" opacity="0.35"/>
  <line x1="8.5" y1="62" x2="19.5" y2="62" stroke="#5a4210" stroke-width="0.5" opacity="0.35"/>

  <!-- Wood grain (vertical highlights) -->
  <line x1="12" y1="8" x2="11.5" y2="30" stroke="#9a7830" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="35" x2="16.5" y2="60" stroke="#9a7830" stroke-width="0.5" opacity="0.4"/>

  <!-- Knot hole -->
  <ellipse cx="14" cy="44" rx="2.5" ry="3" fill="#5a4210"/>
  <ellipse cx="14" cy="44" rx="1.5" ry="2" fill="#4a3508"/>
  <ellipse cx="14" cy="44" rx="0.5" ry="0.8" fill="#3a2805"/>

  <!-- Top end (broken/snapped look) -->
  <path d="M 8 6 L 9 3 L 12 5 L 14 2 L 16 4.5 L 18 3 L 20 6" fill="#7a5c1e" stroke="#5a4210" stroke-width="0.6"/>

  <!-- Bottom end (cut, with rings) -->
  <ellipse cx="14" cy="74" rx="5.5" ry="3.5" fill="#9a7828"/>
  <ellipse cx="14" cy="74" rx="5.5" ry="3.5" fill="none" stroke="#5a4210" stroke-width="0.6"/>
  <ellipse cx="14" cy="74" rx="3.5" ry="2.2" fill="none" stroke="#b89840" stroke-width="0.3"/>
  <ellipse cx="14" cy="74" rx="1.5" ry="1" fill="none" stroke="#b89840" stroke-width="0.3"/>
  <circle cx="14" cy="74" r="0.4" fill="#5a4210"/>

  <!-- MOSS (along one side) -->
  <ellipse cx="7" cy="20" rx="2" ry="4" fill="#4a8c2a" opacity="0.6"/>
  <ellipse cx="7.3" cy="19" rx="1.5" ry="3" fill="#5aa335" opacity="0.5"/>
  <ellipse cx="6.8" cy="22" rx="1.2" ry="2" fill="#6bbf40" opacity="0.4"/>

  <ellipse cx="7.5" cy="48" rx="2.2" ry="5" fill="#4a8c2a" opacity="0.55"/>
  <ellipse cx="7.8" cy="47" rx="1.5" ry="3.5" fill="#5aa335" opacity="0.45"/>
  <ellipse cx="7.2" cy="50" rx="1" ry="2.5" fill="#6bbf40" opacity="0.35"/>

  <!-- Small twig branching off -->
  <line x1="20" y1="30" x2="25" y2="26" stroke="#7a5c1e" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="25" y1="26" x2="26" y2="23" stroke="#7a5c1e" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Tiny leaf on twig -->
  <path d="M 25.5 24 Q 27 21 28 22.5 Q 26.5 23.5 25.5 24" fill="#5a9933"/>
</svg>
