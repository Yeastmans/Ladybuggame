<svg xmlns="http://www.w3.org/2000/svg" width="240" height="192" viewBox="0 0 64 48">
  <!-- LADYBUG — gliding state (wings unfurled outward, wider sprite) -->

  <!-- Left wing (unfurled, angled out) -->
  <ellipse cx="12" cy="26" rx="14" ry="12" fill="#d91e1a" stroke="#8c0d0d" stroke-width="1.2" transform="rotate(-15, 12, 26)"/>
  <!-- Left wing spots -->
  <circle cx="6" cy="22" r="3.0" fill="#1a0d0d"/>
  <circle cx="10" cy="30" r="2.5" fill="#1a0d0d"/>
  <circle cx="4" cy="29" r="1.6" fill="#1a0d0d"/>
  <circle cx="14" cy="20" r="2.0" fill="#1a0d0d"/>
  <circle cx="8" cy="35" r="1.8" fill="#1a0d0d"/>

  <!-- Right wing (unfurled, angled out) -->
  <ellipse cx="52" cy="26" rx="14" ry="12" fill="#d91e1a" stroke="#8c0d0d" stroke-width="1.2" transform="rotate(15, 52, 26)"/>
  <!-- Right wing spots -->
  <circle cx="58" cy="22" r="3.0" fill="#1a0d0d"/>
  <circle cx="54" cy="30" r="2.5" fill="#1a0d0d"/>
  <circle cx="60" cy="29" r="1.6" fill="#1a0d0d"/>
  <circle cx="50" cy="20" r="2.0" fill="#1a0d0d"/>
  <circle cx="56" cy="35" r="1.8" fill="#1a0d0d"/>

  <!-- Inner wings (translucent flight wings underneath) -->
  <ellipse cx="18" cy="27" rx="10" ry="9" fill="#c8d8e8" opacity="0.35" transform="rotate(-10, 18, 27)"/>
  <ellipse cx="46" cy="27" rx="10" ry="9" fill="#c8d8e8" opacity="0.35" transform="rotate(10, 46, 27)"/>
  <!-- Wing veins -->
  <line x1="22" y1="20" x2="14" y2="34" stroke="#a0b0c0" stroke-width="0.4" opacity="0.5"/>
  <line x1="20" y1="22" x2="12" y2="30" stroke="#a0b0c0" stroke-width="0.3" opacity="0.4"/>
  <line x1="42" y1="20" x2="50" y2="34" stroke="#a0b0c0" stroke-width="0.4" opacity="0.5"/>
  <line x1="44" y1="22" x2="52" y2="30" stroke="#a0b0c0" stroke-width="0.3" opacity="0.4"/>

  <!-- Body (smaller, exposed between wings) -->
  <ellipse cx="32" cy="26" rx="8" ry="14" fill="#1a1414" stroke="#0d0a0a" stroke-width="1"/>

  <!-- Abdomen segments -->
  <line x1="25" y1="22" x2="39" y2="22" stroke="#2a2020" stroke-width="0.6" opacity="0.5"/>
  <line x1="25" y1="27" x2="39" y2="27" stroke="#2a2020" stroke-width="0.6" opacity="0.5"/>
  <line x1="25.5" y1="32" x2="38.5" y2="32" stroke="#2a2020" stroke-width="0.6" opacity="0.5"/>

  <!-- Head (black circle) -->
  <circle cx="32" cy="7" r="8" fill="#1a1414"/>

  <!-- Antennae (wind-swept back) -->
  <path d="M 27 4.5 Q 20 0 16 -2" stroke="#1a1414" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M 37 4.5 Q 44 0 48 -2" stroke="#1a1414" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <circle cx="16" cy="-2" r="2.2" fill="#1a1414"/>
  <circle cx="48" cy="-2" r="2.2" fill="#1a1414"/>

  <!-- Eyes (excited, slightly wider) -->
  <circle cx="27.5" cy="5.5" r="2.8" fill="white"/>
  <circle cx="36.5" cy="5.5" r="2.8" fill="white"/>
  <circle cx="28.2" cy="5.8" r="1.3" fill="black"/>
  <circle cx="37.2" cy="5.8" r="1.3" fill="black"/>
  <circle cx="27.3" cy="4.6" r="0.6" fill="white"/>
  <circle cx="36.3" cy="4.6" r="0.6" fill="white"/>

  <!-- Cheek blush -->
  <ellipse cx="25" cy="9" rx="2" ry="1" fill="#ff6b6b" opacity="0.4"/>
  <ellipse cx="39" cy="9" rx="2" ry="1" fill="#ff6b6b" opacity="0.4"/>
</svg>
