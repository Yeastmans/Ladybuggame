<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 20 22">
  <!-- APHID — skittering (legs in alternating stride positions) -->

  <!-- Antennae (bouncing) -->
  <path d="M 8 4 Q 6 1 4.5 0" stroke="#4d7326" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <path d="M 12 4 Q 14 1.5 15.5 1" stroke="#4d7326" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <circle cx="4.5" cy="0" r="0.6" fill="#4d7326"/>
  <circle cx="15.5" cy="1" r="0.6" fill="#4d7326"/>

  <!-- Legs in stride (alternating forward/back) -->
  <!-- Front: left forward, right back -->
  <line x1="5" y1="9" x2="1" y2="6" stroke="#4d7326" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="1" y1="6" x2="0.5" y2="7.5" stroke="#4d7326" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="15" y1="9" x2="19" y2="10" stroke="#4d7326" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="19" y1="10" x2="19.5" y2="11.5" stroke="#4d7326" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Middle: left back, right forward -->
  <line x1="4" y1="12" x2="0.5" y2="13.5" stroke="#4d7326" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="0.5" y1="13.5" x2="0" y2="15" stroke="#4d7326" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="16" y1="12" x2="19.5" y2="10.5" stroke="#4d7326" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="19.5" y1="10.5" x2="20" y2="12" stroke="#4d7326" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Back: left forward, right back -->
  <line x1="5" y1="15" x2="1.5" y2="16" stroke="#4d7326" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="1.5" y1="16" x2="1" y2="17.5" stroke="#4d7326" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="15" y1="15" x2="18.5" y2="18" stroke="#4d7326" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="18.5" y1="18" x2="19" y2="19.5" stroke="#4d7326" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="10" cy="13" rx="6.5" ry="6" fill="#a6d166" stroke="#668c40" stroke-width="0.8"/>
  <ellipse cx="10" cy="9" rx="5" ry="4" fill="#b3dc75" stroke="#668c40" stroke-width="0.6"/>

  <!-- Head (tilted slightly for skitter feel) -->
  <circle cx="10" cy="4.8" r="3.2" fill="#80b34d" stroke="#5a8033" stroke-width="0.6"/>

  <!-- Eyes -->
  <circle cx="8.2" cy="4.2" r="1.1" fill="white"/>
  <circle cx="11.8" cy="4.2" r="1.1" fill="white"/>
  <circle cx="8.5" cy="4.4" r="0.55" fill="black"/>
  <circle cx="12.1" cy="4.4" r="0.55" fill="black"/>

  <!-- Worried mouth -->
  <ellipse cx="10" cy="6.5" rx="1" ry="0.5" fill="#5a8033"/>
</svg>
